<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">

<style>
body{
 margin:0;
 overflow:hidden;
}

#bg{
 position:fixed;
 inset:0;
 width:100vw;
 height:100vh;
 object-fit:contain;
 background:white;
}

#runningText{
 position:fixed;
 bottom:0;
 width:100%;
 height:50px;
 background:rgba(0,0,0,.7);
 z-index:999;
 overflow:hidden;
 display:flex;
 align-items:center;
}

#textIsi{
 color:yellow;
 font-size:24px;
 white-space:nowrap;
 padding-left:100%;
 animation:jalan 15s linear infinite;
}

@keyframes jalan{
 from{transform:translateX(0)}
 to{transform:translateX(-100%)}
}
</style>
</head>

<body>

<img id="bg">

<div id="runningText">
<span id="textIsi"></span>
</div>

<script src="script.js"></script>

</body>
</html>
