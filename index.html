<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papan Informasi SD</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#bg {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
  background: black;
}

#runningText {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 50px;
  background: rgba(0,0,0,0.7);
  overflow: hidden;
  z-index: 9999;
  display: flex;
  align-items: center;
}

#runningText span {
  display: inline-block;
  white-space: nowrap;
  color: yellow;
  font-size: 24px;
  padding-left: 100%;
  animation: jalan 12s linear infinite;
}

@keyframes jalan {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>

</head>

<body>

<img id="bg" src="https://drive.google.com/uc?export=view&id=18IGkH4rYrvlBLM7PV9VYLm5QAh72OxHs"
style="width:100vw;height:100vh;object-fit:cover;position:fixed;top:0;left:0;z-index:1;">

<div id="runningText"></div>

<script src="script.js"></script>

</body>
</html>
