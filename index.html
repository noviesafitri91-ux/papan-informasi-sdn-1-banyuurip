<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papan Informasi</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* Gambar background */
#bg {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Running text container */
#runningText {
  position: absolute;
  bottom: 20px;
  width: 100%;
  z-index: 9999;
  background: rgba(0,0,0,0.6);
  overflow: hidden;
  color: yellow;
  font-size: 24px;
  white-space: nowrap;
}

/* animasi berjalan */
#runningText span {
  display: inline-block;
  padding-left: 100%;
  animation: jalan 12s linear infinite;
}

@keyframes jalan {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>

</head>

<body>

<img id="bg" src="">

<div id="runningText"></div>

<script src="script.js"></script>

</body>
</html>
